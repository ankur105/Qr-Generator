<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Code Generator Free</title>

<style>
body{
  font-family: Arial;
  background:#0f172a;
  color:#e5e7eb;
  margin:0;
  display:flex;
  justify-content:center;
}
.wrap{width:900px;padding:20px}
h1{text-align:center}

.card{
  background:#111827;
  padding:16px;
  margin-top:15px;
  border-radius:12px;
}

.tabs{display:flex;gap:10px;margin-bottom:10px}
.tabs button{
  padding:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:#1f2937;
  color:white;
}
.tabs button.active{
  background:#22c55e;
  color:black;
}

input,select{
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:10px;
  border:none;
}

button.main{
  background:#22c55e;
  border:none;
  padding:10px;
  border-radius:10px;
  cursor:pointer;
}

.hidden{display:none}
.center{text-align:center}
img{margin-top:10px;background:white;padding:10px;border-radius:10px}

footer{
  text-align:center;
  opacity:0.7;
  font-size:12px;
  margin-top:15px;
}
</style>
</head>

<body>
<div class="wrap">

<h1>Free QR Code Generator</h1>

<div class="card">
  <div class="tabs">
    <button class="tab active" data-tab="text">Text / URL</button>
    <button class="tab" data-tab="image">Image</button>
    <button class="tab" data-tab="wifi">WiFi</button>
    <button class="tab" data-tab="whatsapp">WhatsApp</button>
  </div>

  <!-- TEXT -->
  <div id="text" class="tab-content">
    <input id="textInput" placeholder="Enter text or URL">
    <button class="main" onclick="generateTextQR()">Generate QR</button>
  </div>

  <!-- IMAGE -->
  <div id="image" class="tab-content hidden">
    <h3>Upload Image</h3>
    <input type="file" id="imageInput" accept="image/*">
    <button class="main" onclick="generateImageQR()">Generate QR</button>
  </div>

  <!-- WIFI -->
  <div id="wifi" class="tab-content hidden">
    <input id="ssid" placeholder="WiFi Name">
    <input id="password" placeholder="Password">
    <button class="main" onclick="generateWifiQR()">Generate QR</button>
  </div>

  <!-- WHATSAPP -->
  <div id="whatsapp" class="tab-content hidden">
    <input id="phone" placeholder="Phone number">
    <input id="message" placeholder="Message">
    <button class="main" onclick="generateWhatsAppQR()">Generate QR</button>
  </div>
</div>

<div class="card center">
  <img id="qrImage" src="" alt="QR will appear here">
</div>

<!-- ✅ Footer -->
<footer>
  Made for learning. by Atul Verma
</footer>

</div>

<script>
// TAB SWITCH
const tabs = document.querySelectorAll(".tab");
const contents = document.querySelectorAll(".tab-content");

tabs.forEach(tab=>{
  tab.addEventListener("click",()=>{
    tabs.forEach(t=>t.classList.remove("active"));
    tab.classList.add("active");

    contents.forEach(c=>c.classList.add("hidden"));
    document.getElementById(tab.dataset.tab).classList.remove("hidden");
  });
});

// QR GENERATOR
function makeQR(data){
  const url = "https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=" + encodeURIComponent(data);
  document.getElementById("qrImage").src = url;
}

// TEXT
function generateTextQR(){
  const text = document.getElementById("textInput").value;
  if(!text) return alert("Enter text");
  makeQR(text);
}

// IMAGE
function generateImageQR(){
  const file = document.getElementById("imageInput").files[0];
  if(!file) return alert("Upload image first");

  const reader = new FileReader();
  reader.onload = function(){
    makeQR(reader.result);
  }
  reader.readAsDataURL(file);
}

// WIFI
function generateWifiQR(){
  const ssid = document.getElementById("ssid").value;
  const pass = document.getElementById("password").value;

  const data = `WIFI:T:WPA;S:${ssid};P:${pass};;`;
  makeQR(data);
}

// WHATSAPP
function generateWhatsAppQR(){
  const phone = document.getElementById("phone").value;
  const msg = document.getElementById("message").value;

  const url = `https://wa.me/${phone}?text=${encodeURIComponent(msg)}`;
  makeQR(url);
}
</script>

</body>
</html>
